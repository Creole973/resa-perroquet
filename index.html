<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réservation Initiation Kompa – Le Perroquet</title>
    <meta name="description"
        content="Réservez votre place pour l'initiation Kompa au Perroquet, Mâcon. Les Jeudis Tropicaux par Sonrisa de Baile.">
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Roboto:wght@400;500;700;900&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- Particules dorées décoratives -->
    <div class="gold-particles" id="goldParticles"></div>

    <div class="page-wrapper">
        <div class="card">

            <!-- Logo -->
            <div class="logo-wrapper">
                <img src="logo perroquet.jpeg" alt="Le Perroquet – Cocktail Bar" class="logo">
            </div>

            <!-- Titre -->
            <h1 class="form-title">RESERVATION INITIATION<br>KOMPA</h1>
            <p class="form-subtitle">Les Jeudis Tropicaux — Le Perroquet</p>

            <!-- Formulaire -->
            <form id="perroquetForm">

                <!-- NOM -->
                <div class="form-group">
                    <label for="nom">NOM</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.8">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                        <input type="text" id="nom" name="nom" placeholder="Entrez votre nom" required>
                    </div>
                </div>

                <!-- PRÉNOM -->
                <div class="form-group">
                    <label for="prenom">PRÉNOM</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.8">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                        <input type="text" id="prenom" name="prenom" placeholder="Entrez votre prénom" required>
                    </div>
                </div>

                <!-- DÉJÀ INSCRIT SUR WHATSAPP -->
                <div class="form-group">
                    <label for="whatsapp">DÉJÀ INSCRIT SUR WHATSAPP</label>
                    <div class="input-wrapper select-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.8">
                            <path
                                d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" />
                        </svg>
                        <select id="whatsapp" name="whatsapp" required>
                            <option value="" disabled selected>Déjà inscrit sur Whatsapp ?</option>
                            <option value="OUI">OUI</option>
                            <option value="NON">NON</option>
                        </select>
                        <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polyline points="6 9 12 15 18 9" />
                        </svg>
                    </div>
                </div>

                <!-- N° TÉLÉPHONE -->
                <div class="form-group">
                    <label for="telephone">N° TÉLÉPHONE</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.8">
                            <path
                                d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.15 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.06 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z" />
                        </svg>
                        <input type="tel" id="telephone" name="telephone" placeholder="06 XX XX XX XX" required>
                    </div>
                </div>

                <!-- ACTIVITÉS -->
                <div class="form-group">
                    <label for="activites">ACTIVITÉS</label>
                    <div class="input-wrapper select-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.8">
                            <circle cx="12" cy="12" r="10" />
                            <polyline points="12 6 12 12 16 14" />
                        </svg>
                        <select id="activites" name="activites" required>
                            <option value="" disabled selected>Choisissez une activité</option>
                            <option value="Cours">Cours</option>
                            <option value="Soirée">Soirée</option>
                            <option value="Cours + Soirée">Cours + Soirée</option>
                        </select>
                        <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polyline points="6 9 12 15 18 9" />
                        </svg>
                    </div>
                </div>

                <!-- POSITIONNEMENT -->
                <div class="form-group">
                    <label for="positionnement">POSITIONNEMENT</label>
                    <div class="input-wrapper select-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.8">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                            <circle cx="9" cy="7" r="4" />
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                        </svg>
                        <select id="positionnement" name="positionnement" required>
                            <option value="" disabled selected>Choisissez votre positionnement</option>
                            <option value="Leader">Leader</option>
                            <option value="Follower">Follower</option>
                        </select>
                        <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polyline points="6 9 12 15 18 9" />
                        </svg>
                    </div>
                </div>

                <!-- BOUTON -->
                <button type="submit" id="submitBtn">S'INSCRIRE</button>

                <p id="statusMessage"></p>
            </form>

            <!-- Footer -->
            <p class="footer-text">© 2026 Sonrisa de Baile — Le Perroquet, Mâcon</p>
        </div>
    </div>

    <!-- Overlay de succès -->
    <div id="successOverlay" class="success-overlay hidden">
        <div class="confetti-container" id="confettiContainer"></div>
        <div class="success-card">
            <div class="success-logo-wrapper">
                <img src="logo perroquet.jpeg" alt="Le Perroquet" class="success-logo">
            </div>
            <div class="success-checkmark">
                <svg viewBox="0 0 52 52">
                    <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none" />
                    <path class="checkmark-check" fill="none" d="M14 27l8 8 16-16" />
                </svg>
            </div>
            <h2 class="success-title">Inscription confirmée !</h2>
            <p class="success-message">Merci pour l'inscription et à très vite sur la piste de danse 🕺💃</p>
            <div class="success-icons">🎶 🌟 🎉 🌟 🎶</div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
